<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WM Daily Completion</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#4f46e5">
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%); min-height: 100vh; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
    
    /* Admin Toggle Animation */
    #admin-controls { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    #admin-controls.revealed { max-height: 100px; opacity: 1; margin-bottom: 2rem; }
    
    /* PDF Styling Safe Blocks */
    .pdf-safe-chunk { page-break-inside: avoid !important; break-inside: avoid !important; margin-bottom: 2rem; border-radius: 0.75rem; overflow: hidden; border: 1px solid #cbd5e1; box-shadow: 0 4px 6px rgba(0,0,0,0.02); background: white; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #cbd5e1; text-align: center; vertical-align: middle; }
    th { font-weight: 800; font-size: 13px; padding: 12px 8px; color: #0f172a; }
    td { font-weight: 700; font-size: 12px; padding: 10px; color: #334155; }
    
    .bg-section-head { background-color: #e0e7ff; } 
    .bg-pendency { background-color: #fee2e2; } 
    .bg-completion { background-color: #dcfce3; } 
    .alert-red { background-color: #fef2f2 !important; color: #b91c1c !important; font-weight: 800; }
    .bg-total-row td { background-color: #f1f5f9 !important; font-weight: 800; color: #0f172a; }
    
    select { appearance: none; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 1rem center; background-size: 1em; padding-right: 2.5rem; }
    
    @media print { .no-print { display: none !important; } body { background: #fff; } .glass-panel { box-shadow: none; border: none; } }
  </style>
</head>
<body class="p-4 md:p-8 text-slate-900">

<!-- Config -->
<script>
  const GAS_URL = "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE"; 
  const API_SECRET = "wm_secure_key_2026";
</script>

<div id="loading-overlay" class="fixed inset-0 bg-indigo-50/95 backdrop-blur-md z-50 flex flex-col items-center justify-center transition-opacity duration-500">
  <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
  <p class="text-lg font-bold tracking-wide text-slate-800 flex items-center gap-2"><i data-lucide="bar-chart" class="w-5 h-5 text-indigo-600"></i> Aggregating Reports...</p>
</div>

<div class="flex justify-center gap-4 mb-8 no-print">
  <button onclick="navigateTo('Index', this)" class="px-6 py-2 rounded-full font-bold text-sm bg-white/70 text-slate-700 border-2 border-slate-200 hover:bg-slate-100 transition-colors">Pendency Dashboard</button>
  <button class="px-6 py-2 rounded-full font-bold text-sm bg-slate-900 text-white shadow-lg cursor-default">Daily Completion</button>
</div>

<main class="glass-panel max-w-4xl mx-auto rounded-3xl p-4 md:p-8">
  <div id="admin-controls" class="flex justify-center items-center gap-4 no-print bg-slate-50 p-4 rounded-2xl border border-slate-200">
    <select id="col10Filter" onchange="applyFilters()" class="border-2 border-slate-200 rounded-xl px-4 py-2.5 font-bold text-slate-700 focus:border-indigo-600 outline-none w-48 text-center bg-white">
      <option value="ALL">All Trainers</option>
    </select>
    <button id="exportBtn" onclick="exportReport()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-md transition-transform hover:-translate-y-0.5">
      <i data-lucide="file-text" class="w-5 h-5"></i> Export to PDF
    </button>
  </div>

  <div id="report-container" class="hidden">
    <div id="cityContainer"></div>
    <div id="coachContainer"></div>
    <div class="html2pdf__page-break"></div>
    <div id="storeContainer"></div>
  </div>
</main>

<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-full font-bold shadow-2xl transition-opacity duration-300 opacity-0 pointer-events-none z-50"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>

<script>
  lucide.createIcons();
  let globalRawData = [];
  let cIdx = 3, sIdx = 4, tIdx = 5, dIdx = 6, fIdx = 7, col10Idx = 9;
  let dataLoaded = false;

  async function apiCall(action) {
    if (window.google && google.script) {
      return new Promise((res, rej) => google.script.run.withSuccessHandler(res).withFailureHandler(rej)[action]());
    } else {
      const req = await fetch(`${GAS_URL}?action=${action}`);
      return await req.json();
    }
  }

  document.addEventListener('dblclick', () => {
    if (!dataLoaded) return; 
    const ctrl = document.getElementById('admin-controls');
    const isHidden = !ctrl.classList.contains('revealed');
    ctrl.classList.toggle('revealed');
    
    if (isHidden) {
      const t = document.getElementById('toast');
      t.innerHTML = `<i data-lucide="unlock" class="inline w-4 h-4 mr-2"></i> Admin Controls Unlocked`;
      lucide.createIcons();
      t.classList.remove('opacity-0');
      setTimeout(() => t.classList.add('opacity-0'), 2500);
    }
  });

  const toTitleCase = str => str ? str.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') : "";

  async function initApp() {
    try {
      let rawCache = sessionStorage.getItem('wm_raw_report_data');
      let data = rawCache ? JSON.parse(rawCache) : await apiCall('getRawWMData');
      
      if (!data || data.length === 0) throw new Error("No data found");
      if (!rawCache) sessionStorage.setItem('wm_raw_report_data', JSON.stringify(data));

      const headers = data[0].map(h => String(h).toLowerCase().replace(/['" \n]/g, ''));
      
      // Dynamic Column Matching logic preserved perfectly
      if (headers.includes('city') || headers.includes('trainingcompleted')) {
        const findIdx = str => headers.findIndex(x => x.includes(str));
        if (findIdx('city') > -1) cIdx = findIdx('city');
        if (findIdx('storename') > -1) sIdx = findIdx('storename');
        if (findIdx('trainingcompleted') > -1) tIdx = findIdx('trainingcompleted');
        if (findIdx('today') > -1) dIdx = findIdx('today');
        if (findIdx('fleetcoach') > -1) fIdx = findIdx('fleetcoach');
        if (headers.findIndex(x => x.includes('trainer') || x === 'col10') > -1) col10Idx = headers.findIndex(x => x.includes('trainer') || x === 'col10');
        data.shift(); 
      }

      globalRawData = data;
      const select = document.getElementById('col10Filter');
      const uniques = new Set();
      
      globalRawData.forEach(row => {
        if (row.length > col10Idx) {
          const val = row[col10Idx] ? String(row[col10Idx]).trim() : "";
          if (val && val.toUpperCase() !== '#N/A') uniques.add(val);
        }
      });

      [...uniques].sort().forEach(opt => select.insertAdjacentHTML('beforeend', `<option value="${opt}">${opt}</option>`));
      if ([...uniques].includes('Dhrubajyoti Dutta')) select.value = 'Dhrubajyoti Dutta';

      applyFilters();
      
      const loader = document.getElementById('loading-overlay');
      loader.classList.add('opacity-0', 'pointer-events-none');
      document.getElementById('report-container').classList.remove('hidden');
      dataLoaded = true;

    } catch (err) { alert("Error loading data. Refresh the page."); }
  }
  document.addEventListener('DOMContentLoaded', initApp);

  function applyFilters() {
    const filterVal = document.getElementById('col10Filter').value;
    const cityData = {}, coachData = {}, storeData = {};

    globalRawData.forEach(row => {
      if (row.length <= Math.max(cIdx, sIdx, tIdx, dIdx, fIdx, col10Idx)) return; 
      
      if (filterVal !== "ALL" && (row[col10Idx] ? String(row[col10Idx]).trim() : "") !== filterVal) return;

      const city = toTitleCase(row[cIdx] ? String(row[cIdx]).trim() : "");
      const store = toTitleCase(row[sIdx] ? String(row[sIdx]).trim() : "");
      let coach = toTitleCase(row[fIdx] ? String(row[fIdx]).trim() : "");
      if (!coach || coach.toUpperCase() === "N/A" || coach.toUpperCase() === "#N/A") coach = "Missing";
      
      if (!city) return;

      const isPendency = (String(row[tIdx]).trim().toUpperCase() === 'NO');
      const isCompletion = (String(row[dIdx]).trim().toUpperCase() === 'YES');

      [ {d: cityData, k: city}, {d: coachData, k: coach}, {d: storeData, k: store} ].forEach(obj => {
        if (!obj.d[obj.k]) obj.d[obj.k] = { name: obj.k, pendency: 0, completion: 0 };
        if (isPendency) obj.d[obj.k].pendency++;
        if (isCompletion) obj.d[obj.k].completion++;
      });
    });

    const sortDesc = (a, b) => b.pendency - a.pendency;
    const cityArr = Object.values(cityData).sort(sortDesc);
    const coachArr = Object.values(coachData).sort(sortDesc);
    const storeArr = Object.values(storeData).sort(sortDesc);

    const agg = arr => arr.reduce((acc, curr) => ({ p: acc.p + curr.pendency, c: acc.c + curr.completion }), {p:0, c:0});

    renderTable('cityContainer', 'City Wise Report', 'City Name', cityArr, agg(cityArr)); 
    renderTable('coachContainer', 'Fleet Coach Report', 'Fleet Coach', coachArr, agg(coachArr)); 
    renderTable('storeContainer', 'Store Wise Report', 'Dark Store Name', storeArr, agg(storeArr)); 
  }

  function renderTable(containerId, title, colHeader, dataArray, totals) {
    const container = document.getElementById(containerId);
    container.innerHTML = ''; 
    
    if (dataArray.length === 0) {
      container.innerHTML = `<div class="pdf-safe-chunk"><div class="bg-section-head font-bold p-3 text-center text-sm border-b border-slate-300">${title}</div><div class="p-8 text-center font-bold text-slate-500">No data available.</div></div>`;
      return;
    }

    const chunk_size = 35; 
    for (let i = 0; i < dataArray.length; i += chunk_size) {
      const chunk = dataArray.slice(i, i + chunk_size);
      const isFirst = (i === 0), isLast = (i + chunk_size) >= dataArray.length;
      
      let html = `<div class="pdf-safe-chunk"><table><thead>`;
      if (isFirst) html += `<tr><th colspan="3" class="bg-section-head text-sm border-b-2 border-slate-300 py-3">${title}</th></tr>`;
      
      html += `<tr>
                <th class="bg-slate-100 w-2/5">${colHeader}</th>
                <th class="bg-pendency w-[30%]">Total Pendency</th>
                <th class="bg-completion w-[30%]">Today's Completion</th>
              </tr></thead><tbody class="divide-y divide-slate-100">`;

      chunk.forEach(item => {
        const compClass = item.completion < 10 ? 'alert-red' : '';
        const nameHtml = item.name === 'Missing' ? '<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-xs font-extrabold border border-red-200">Missing</span>' : item.name;
        html += `<tr><td>${nameHtml}</td><td class="font-bold">${item.pendency}</td><td class="${compClass} font-bold">${item.completion}</td></tr>`;
      });
      html += `</tbody>`;

      if (isLast) html += `<tfoot><tr class="bg-total-row"><td>TOTAL</td><td>${totals.p}</td><td>${totals.c}</td></tr></tfoot>`;
      
      html += `</table></div>`;
      container.innerHTML += html;
      if (!isLast) container.innerHTML += `<div class="html2pdf__page-break"></div>`;
    }
  }

  function exportReport() {
    const el = document.getElementById('report-container');
    const btn = document.getElementById('exportBtn');
    const origText = btn.innerHTML;
    
    btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Generating...`;
    lucide.createIcons();
    btn.disabled = true;
    
    html2pdf().set({
      margin: [0.4, 0.4, 0.4, 0.4], filename: 'WM_Completion_Report.pdf',
      image: { type: 'jpeg', quality: 0.98 }, 
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    }).from(el).save().then(() => {
      btn.innerHTML = origText; btn.disabled = false;
    });
  }

  function navigateTo(page, btn) {
    btn.innerText = "Routing...";
    if (window.google && google.script) {
      google.script.run.withSuccessHandler(url => window.top.location.href = url + "?page=" + page).getScriptUrl();
    } else window.location.href = `${page}.html`; 
  }
</script>
</body>
</html>
