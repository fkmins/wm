<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WM Pendency Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  
  <style>
    html, body { scrollbar-width: none !important; -ms-overflow-style: none !important; }
    ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
    * { scrollbar-width: none !important; -ms-overflow-style: none !important; text-align: center !important; text-transform: capitalize; }

    :root { --primary: #4f46e5; --text-pure-black: #000000; --bg-glass: rgba(255, 255, 255, 0.95); }
    
    body { background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%); margin: 0; padding: 20px 15px 30px 15px; min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: var(--text-pure-black); }

    .top-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
    .btn-nav { background: rgba(255,255,255,0.7); border: 2px solid #e2e8f0; border-radius: 50px; padding: 8px 24px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.3s; color: var(--text-pure-black); text-decoration: none; display: inline-block;}
    .btn-nav:hover, .btn-nav.active { background: var(--text-pure-black); color: #fff; border-color: var(--text-pure-black); }

    #loading-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(224, 231, 255, 0.95); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.7s cubic-bezier(0.8, 0, 0.2, 1); backdrop-filter: blur(5px); }
    .skeleton-box { background: rgba(255,255,255,0.6); border-radius: 12px; margin-bottom: 20px; animation: pulse-bg 1.5s infinite ease-in-out; }
    @keyframes pulse-bg { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    .slide-up { transform: translateY(-100%); }
    .spinner { width: 50px; height: 50px; border: 5px solid #ffffff; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    .loading-text-anim { font-weight: 800; font-size: 18px; color: var(--text-pure-black); letter-spacing: 1px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .glass-panel { background: var(--bg-glass); border-radius: 20px; padding: 35px 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 900px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.7); z-index: 10; margin: auto; }
    .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
    .btn-mode { border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; background: #e2e8f0; color: var(--text-pure-black); transition: 0.3s; flex: 1; max-width: 250px; font-size: 14px; }
    .btn-mode:hover:not(.mode-active) { background: #cbd5e1; transform: translateY(-2px); }
    .mode-active { background: var(--primary) !important; color: #fff !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3) !important; }
    .ts-control, .form-select { border-radius: 12px !important; padding: 14px !important; border: 2px solid #e2e8f0 !important; background: #fff !important; cursor: pointer; text-align: center !important; text-align-last: center !important; transition: 0.3s; }
    .ts-control.focus, .form-select:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important; outline: none; }
    .ts-control .item, .ts-control input { display: block !important; width: 100% !important; text-align: center !important; font-weight: 800; font-size: 15px; color: var(--text-pure-black) !important; }
    .ts-dropdown { border-radius: 12px !important; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.15); padding: 5px; text-align: center !important; }
    .ts-dropdown .option { padding: 12px; font-weight: 800; text-align: center !important; border-radius: 8px; margin-bottom: 2px; color: var(--text-pure-black) !important; transition: 0.2s; }
    .ts-dropdown .option:hover, .ts-dropdown .active { background-color: #e0e7ff !important; color: var(--primary) !important; }
    .ts-control::after, .form-select::after { display: none !important; } 

    #resultArea { margin-top: 35px; flex-direction: column; align-items: center; }
    .badge-pendency { background: var(--primary); color: #fff; padding: 12px 30px; border-radius: 50px; font-weight: 800; margin-bottom: 25px; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: inline-block; }
    .badge-pendency span { background: #fff; color: var(--primary); padding: 2px 14px; border-radius: 12px; margin-left: 10px; font-size: 15px; }

    .action-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 25px; width: 100%; }
    .btn-action { border: none; padding: 12px 24px; border-radius: 10px; font-weight: 800; font-size: 14px; transition: all 0.3s; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-action:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-pdf { background: var(--primary); color: #fff; }
    .btn-sheet { background: #10b981; color: #fff; }
    
    .table-responsive { background: #fff; border-radius: 12px; overflow: hidden; width: 100%; border: 1px solid #e2e8f0; margin-bottom: 20px; }
    .table { margin-bottom: 0; width: 100%; border-collapse: collapse; }
    .table thead th { background: #f8fafc; color: var(--text-pure-black); border-bottom: 2px solid #e2e8f0; padding: 16px; font-size: 13px; font-weight: 800; border-top: none; }
    .table tbody tr { transition: background-color 0.2s; border-bottom: 1px solid #e2e8f0; }
    .table tbody tr:hover { background-color: #f1f5f9 !important; }
    .table td { padding: 18px; font-weight: 800; font-size: 14px; border: none; vertical-align: middle; color: var(--text-pure-black); }
    .empty-state-img { width: 180px; margin: 0 auto 15px auto; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .badge-count { background-color: var(--primary); color: white; padding: 8px 0; border-radius: 25px; font-size: 15px; font-weight: 800; min-width: 90px; display: inline-block; }
    .fc-missing-pill { background-color: #fee2e2; color: #b91c1c; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 800; border: 1px solid #fca5a5; display: inline-block; }

    .pagination-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 15px; margin-bottom: 15px; }
    .btn-page { padding: 10px 20px; font-weight: 800; border: none; background: #e2e8f0; color: var(--text-pure-black); border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 13px; }
    .btn-page:hover:not(:disabled) { background: #cbd5e1; transform: translateY(-2px); }
    .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }

    #toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
    .toast-msg { background: var(--text-pure-black); color: #fff; padding: 12px 24px; border-radius: 50px; font-weight: 800; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="skeleton-box" style="width: 300px; height: 40px;"></div>
  <div class="skeleton-box" style="width: 600px; height: 50px;"></div>
  <div class="spinner"></div>
  <div class="loading-text-anim">~ : Welcome :~</div>
</div>

<div class="top-nav">
  <button class="btn-nav active">Pendency Dashboard</button>
  <a href="report.html" class="btn-nav" onclick="this.innerText='Rerouting ...';">Daily Completion</a>
</div>

<div class="glass-panel" id="mainPanel">
  <h2 class="fw-bold mb-4" style="text-align: center;">WM Pendency Dashboard</h2>
  
  <div class="tab-container">
    <button id="btnNormal" class="btn-mode mode-active" onclick="setMode(false)">Dark Store Wise</button>
    <button id="btnCoach" class="btn-mode" onclick="setMode(true)">Fleet Coach Wise</button>
  </div>

  <div class="row g-4 mb-4 justify-content-center">
    <div class="col-md-5">
      <select id="citySelect" class="form-select w-100" disabled>
        <option value="">Wait, Loading ...</option>
      </select> 
    </div>
    <div class="col-md-5" id="storeWrapper">
      <select id="storeSelect" class="form-select w-100" disabled>
        <option value="">Search / Select Dark Store</option>
      </select> 
    </div>
  </div>
  
  <div id="resultArea" style="display:none; width:100%">
    <div class="badge-pendency">Total Pendency <span id="countBadge">0</span></div>
    
    <div class="action-buttons">
      <button id="dlPdf" class="btn-action btn-pdf" onclick="doExport('pdf')">Download as PDF</button>
      <button id="dlSheet" class="btn-action btn-sheet" onclick="doExport('sheet')">Open as Google Sheet</button>
    </div>

    <div class="table-responsive">
      <table class="table w-100">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div id="paginationControls" class="pagination-container" style="display:none;">
      <button class="btn-page" id="btnPrev" onclick="changePage(-1)">Previous</button>
      <span id="pageIndicator" style="font-weight: 800; font-size: 14px; color: var(--text-pure-black);">Page 1 of 1</span>
      <button class="btn-page" id="btnNext" onclick="changePage(1)">Next</button>
    </div>
  </div>
</div>

<div id="toast-container"><div class="toast-msg" id="toastText"></div></div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script>
  // ------------------------------------------------------------
  // IMPORTANT: PASTE YOUR GOOGLE WEB APP URL BETWEEN THE QUOTES
  // ------------------------------------------------------------
  const API_URL = "https://script.google.com/macros/s/AKfycbyC-vsg3r84HEqqJKLxI8bt2pjciirxT012varIWj09ba1hqs80cpK9j_YKNchogDA7nQ/exec";

  let db = [], filtered = [], displayArray = [], coachMode = false, cityCtrl, storeCtrl;
  let currentPage = 1, rowsPerPage = 50, totalPages = 1;

  function showToast(msg, isError = false) {
      const container = document.getElementById('toast-container');
      const txt = document.getElementById('toastText');
      txt.innerText = msg;
      txt.style.background = isError ? "#ef4444" : "var(--text-pure-black)";
      container.style.display = 'block';
      setTimeout(() => { container.style.display = 'none'; }, 2500);
  }

  window.onload = () => {
    fetch(API_URL + "?action=getPendency")
      .then(response => response.json())
      .then(d => {
        if (d.error) return showToast("Error connecting to data", true);
        db = d;
        
        const cityEl = document.getElementById('citySelect');
        const storeEl = document.getElementById('storeSelect');

        cityEl.innerHTML = '<option value="">Search / Select City</option>';
        [...new Set(db.map(i => i.city))].sort().forEach(c => cityEl.add(new Option(c, c)));
        cityEl.disabled = false; storeEl.disabled = false;

        cityCtrl = new TomSelect("#citySelect", { create: false, sortField: { field: "text", direction: "asc" }, onChange: handleCityChange, maxOptions: 50 });
        storeCtrl = new TomSelect("#storeSelect", { create: false, sortField: { field: "text", direction: "asc" }, onChange: updateTable, maxOptions: 50 });
        storeCtrl.disable();

        const loader = document.getElementById('loading-overlay');
        loader.classList.add('slide-up');
        setTimeout(() => { loader.style.display = 'none'; }, 700);
      })
      .catch(err => showToast("Failed to load data from server.", true));
  };

  function setMode(m) {
    coachMode = m;
    document.getElementById('btnNormal').classList.toggle('mode-active', !m);
    document.getElementById('btnCoach').classList.toggle('mode-active', m);
    document.getElementById('storeWrapper').style.display = m ? 'none' : 'block';
    document.getElementById('resultArea').style.display = 'none';
    if(cityCtrl) cityCtrl.clear(); 
    if(storeCtrl) storeCtrl.clear();
  }

  function handleCityChange(c) {
    document.getElementById('resultArea').style.display = 'none';
    if (!c) return;
    if (coachMode) { updateTable(); } else {
      storeCtrl.clearOptions(); storeCtrl.clear();
      [...new Set(db.filter(i => i.city === c).map(i => i.darkStore))].sort().forEach(s => storeCtrl.addOption({ value: s, text: s }));
      storeCtrl.enable();
    }
  }

  function updateTable() {
    const c = cityCtrl.getValue(), s = storeCtrl.getValue();
    if (!c || (!coachMode && !s)) return;
    
    let temp = coachMode ? db.filter(i => i.city === c) : db.filter(i => i.city === c && i.darkStore === s);
    filtered = temp;
    
    if (coachMode) {
      let sum = {}; filtered.forEach(i => sum[i.fleetCoach] = (sum[i.fleetCoach] || 0) + 1);
      displayArray = Object.entries(sum).sort().map(([n, cnt]) => ({name: n, cnt: cnt}));
    } else { displayArray = filtered; }

    document.getElementById('countBadge').innerText = filtered.length;
    document.getElementById('dlSheet').disabled = document.getElementById('dlPdf').disabled = filtered.length === 0;
    
    currentPage = 1; renderPage();
  }

  function renderPage() {
    totalPages = Math.ceil(displayArray.length / rowsPerPage) || 1;
    const start = (currentPage - 1) * rowsPerPage;
    const chunk = displayArray.slice(start, start + rowsPerPage);

    let tableHead = "", tableBody = "";
    
    if (filtered.length === 0) {
        document.getElementById('tableHead').innerHTML = '';
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="2" style="padding: 40px;"><img src="https://c.tenor.com/BmCbsCskdA4AAAAC/tenor.gif" class="empty-state-img" alt="All Clear!"><h4 style="font-weight: 800; color: #10b981; margin: 0;">🎉 All Clear!</h4><p style="margin-top: 5px; font-weight: 700; color: #64748b;">No pending items for this selection.</p></td></tr>`;
        document.getElementById('resultArea').style.display = 'flex';
        document.getElementById('paginationControls').style.display = 'none';
        return;
    }

    if (coachMode) {
      tableHead = `<tr><th>Fleet Coach</th><th>Total Pendency</th></tr>`;
      tableBody = chunk.map(i => {
        const displayName = i.name === 'FC Name Missing' ? '<span class="fc-missing-pill">FC Name Missing</span>' : i.name;
        return `<tr><td>${displayName}</td><td><span class="badge-count">${i.cnt}</span></td></tr>`;
      }).join('');
    } else {
      tableHead = `<tr><th style="width:50%">WM Name</th><th style="width:50%">Shipsy ID</th></tr>`;
      tableBody = chunk.map(i => `<tr><td>${i.name}</td><td style="text-transform:none;">${i.shipsyId}</td></tr>`).join('');
    }

    document.getElementById('tableHead').innerHTML = tableHead;
    document.getElementById('tableBody').innerHTML = tableBody;
    document.getElementById('resultArea').style.display = 'flex';

    if (displayArray.length > rowsPerPage) {
      document.getElementById('paginationControls').style.display = 'flex';
      document.getElementById('pageIndicator').innerText = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('btnPrev').disabled = currentPage === 1;
      document.getElementById('btnNext').disabled = currentPage === totalPages;
    } else { document.getElementById('paginationControls').style.display = 'none'; }
  }

  function changePage(dir) {
    currentPage += dir;
    if(currentPage < 1) currentPage = 1;
    if(currentPage > totalPages) currentPage = totalPages;
    renderPage();
    document.querySelector('.table-responsive').scrollTop = 0; 
  }

  function doExport(type) {
    if (!filtered.length) return;
    const city = cityCtrl.getValue();
    const name = coachMode ? `${city} Coach Summary` : storeCtrl.getValue();

    const btnSheet = document.getElementById('dlSheet');
    const btnPdf = document.getElementById('dlPdf');
    btnSheet.disabled = true; btnPdf.disabled = true;

    if (type === 'pdf') {
      const originalText = btnPdf.innerText;
      btnPdf.innerText = "Generating PDF...";
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      
      doc.setFont("times", "bold").setFontSize(14).text(`${name} Report`, doc.internal.pageSize.getWidth()/2, 15, { align: "center" });
      doc.setFontSize(10).setTextColor(0).text("How to Login", doc.internal.pageSize.getWidth()/2, 22, { align: "center" });
      
      const p1 = "1. Download ", p2 = "Disprz", p3 = " | 2. User ID: Shipsy ID | 3. Pass: Edl@123";
      doc.setFontSize(9).setFont("times", "normal");
      
      const fullW = doc.getTextWidth(p1) + doc.getTextWidth(p2) + doc.getTextWidth(p3);
      const lx = (doc.internal.pageSize.getWidth() - fullW) / 2;
      doc.text(p1, lx, 28);
      
      const dx = lx + doc.getTextWidth(p1);
      doc.setTextColor(0, 0, 255).setFont("times", "bold").text(p2, dx, 28);
      doc.link(dx, 25, doc.getTextWidth(p2), 5, { url: "https://play.google.com/store/apps/details?id=com.disprz.instantapp" });
      doc.setTextColor(0).setFont("times", "normal").text(p3, dx + doc.getTextWidth(p2) + 2, 28);
      
      doc.autoTable({
        head: coachMode ? [['FLEET COACH', 'DARK STORE', 'WM NAME', 'SHIPSY ID']] : [['NAME', 'SHIPSY ID']],
        body: coachMode ? filtered.map(i => [i.fleetCoach, i.darkStore, i.name, i.shipsyId]) : filtered.map(i => [i.name, i.shipsyId]),
        startY: 35, theme: 'grid', styles: { halign: 'center', fontSize: 8, font: 'times', lineColor: [0,0,0] }, headStyles: { fillColor: [253, 253, 150], textColor: [0,0,0] }
      });
      doc.save(`${name}.pdf`);
      
      fetch(API_URL + "?action=logExport", {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ type: 'pdf', title: name, isCoachMode: coachMode })
      }).finally(() => { btnPdf.innerText = originalText; btnSheet.disabled = false; btnPdf.disabled = false; });

    } else {
      const originalText = btnSheet.innerText;
      btnSheet.innerText = "Creating Sheet..."; 
      
      fetch(API_URL + "?action=processExport", {
        method: "POST",
        headers: { "Content-Type": "text/plain" }, // Bypass preflight CORS requirement
        body: JSON.stringify({ dataStr: JSON.stringify(filtered), title: name, isCoachMode: coachMode })
      })
      .then(response => response.json())
      .then(res => {
        btnSheet.innerText = originalText; btnSheet.disabled = false; btnPdf.disabled = false;
        if (res.error) showToast("Error: " + res.error, true); else window.open(res.url, '_blank'); 
      })
      .catch(err => {
        btnSheet.innerText = originalText; btnSheet.disabled = false; btnPdf.disabled = false;
        showToast("Error: Server connection failed.", true);
      });
    }
  }
</script>
</body>
</html>
