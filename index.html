<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WM Pendency Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#4f46e5">
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.default.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%); min-height: 100vh; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    
    .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
    .ts-control { border-radius: 0.75rem !important; padding: 0.875rem 1rem !important; border: 2px solid #e2e8f0 !important; font-weight: 700; text-align: center; font-family: inherit; }
    .ts-control.focus { border-color: #4f46e5 !important; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important; outline: none; }
    
    .fade-in { animation: fadeIn 0.4s ease-in forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="p-4 md:p-8 text-slate-900">

<!-- Configuration: Set this if hosting on GitHub -->
<script>
  const GAS_URL = "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE"; 
  const API_SECRET = "wm_secure_key_2026";
</script>

<div id="loading-overlay" class="fixed inset-0 bg-indigo-50/95 backdrop-blur-md z-50 flex flex-col items-center justify-center transition-opacity duration-500">
  <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
  <p class="text-lg font-bold tracking-wide text-slate-800 flex items-center gap-2">
    <i data-lucide="database" class="w-5 h-5 text-indigo-600"></i> Syncing Data...
  </p>
</div>

<!-- Navigation -->
<div class="flex justify-center gap-4 mb-8">
  <button class="px-6 py-2 rounded-full font-bold text-sm bg-slate-900 text-white shadow-lg cursor-default">Pendency Dashboard</button>
  <button onclick="navigateTo('Report', this)" class="px-6 py-2 rounded-full font-bold text-sm bg-white/70 text-slate-700 border-2 border-slate-200 hover:bg-slate-100 transition-colors">Daily Completion</button>
</div>

<!-- Main Dashboard -->
<main class="glass-panel max-w-4xl mx-auto rounded-3xl p-6 md:p-10">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-extrabold text-slate-900">WM Pendency</h1>
  </div>
  
  <div class="flex justify-center gap-3 mb-8 bg-slate-100 p-1.5 rounded-2xl max-w-md mx-auto">
    <button id="btnNormal" onclick="setMode(false)" class="flex-1 py-2.5 rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-md transition-all">Dark Store Wise</button>
    <button id="btnCoach" onclick="setMode(true)" class="flex-1 py-2.5 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-200 transition-all">Fleet Coach Wise</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
    <select id="citySelect" disabled placeholder="Wait, Loading..."></select>
    <div id="storeWrapper"><select id="storeSelect" disabled placeholder="Select Dark Store..."></select></div>
  </div>

  <div id="resultArea" class="hidden flex-col items-center">
    <div class="inline-flex items-center gap-3 bg-indigo-600 text-white px-6 py-3 rounded-full font-bold shadow-lg mb-6">
      <i data-lucide="layers"></i> Total Pendency 
      <span id="countBadge" class="bg-white text-indigo-600 px-3 py-0.5 rounded-full text-sm">0</span>
    </div>
    
    <div class="flex flex-wrap justify-center gap-3 mb-6 w-full">
      <button id="dlPdf" onclick="doExport('pdf')" class="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold transition-transform hover:-translate-y-0.5 shadow-md disabled:opacity-50">
        <i data-lucide="file-down" class="w-5 h-5"></i> Download PDF
      </button>
      <button id="dlSheet" onclick="doExport('sheet')" class="flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold transition-transform hover:-translate-y-0.5 shadow-md disabled:opacity-50">
        <i data-lucide="table" class="w-5 h-5"></i> Open in Sheets
      </button>
    </div>

    <div class="w-full bg-white rounded-2xl overflow-hidden border border-slate-200 shadow-sm">
      <table class="w-full text-center">
        <thead id="tableHead" class="bg-slate-50 border-b border-slate-200 text-sm"></thead>
        <tbody id="tableBody" class="divide-y divide-slate-100 text-sm font-semibold"></tbody>
      </table>
    </div>
    
    <div id="paginationControls" class="hidden justify-center items-center gap-4 mt-6">
      <button onclick="changePage(-1)" id="btnPrev" class="px-4 py-2 bg-slate-100 rounded-lg font-bold hover:bg-slate-200 disabled:opacity-50">Prev</button>
      <span id="pageIndicator" class="font-bold text-sm text-slate-600"></span>
      <button onclick="changePage(1)" id="btnNext" class="px-4 py-2 bg-slate-100 rounded-lg font-bold hover:bg-slate-200 disabled:opacity-50">Next</button>
    </div>
  </div>
</main>

<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full font-bold shadow-2xl transition-opacity duration-300 opacity-0 pointer-events-none z-50"></div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script>
  lucide.createIcons();
  let db = [], filtered = [], displayArray = [], coachMode = false, cityCtrl, storeCtrl;
  let currentPage = 1, rowsPerPage = 50, totalPages = 1;

  // Hybrid API Router: Detects GAS env vs GitHub env
  async function apiCall(action, payload = null) {
    if (window.google && google.script) {
      return new Promise((resolve, reject) => {
        if (!payload) google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[action]();
        else {
          // Flatten payload logic to match doPost structure if called directly via GAS HTML
          google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[action](
            payload.dataStr || payload.type, payload.title, payload.isCoachMode
          );
        }
      });
    } else {
      const url = payload ? GAS_URL : `${GAS_URL}?action=${action}`;
      const options = payload ? {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // Avoid CORS preflight
        body: JSON.stringify({ action, secret: API_SECRET, ...payload })
      } : { method: 'GET' };
      
      const res = await fetch(url, options);
      return await res.json();
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.backgroundColor = isError ? '#ef4444' : '#0f172a';
    t.classList.remove('opacity-0');
    setTimeout(() => t.classList.add('opacity-0'), 3000);
  }

  async function initApp() {
    try {
      let rawData = sessionStorage.getItem('wm_pendency_data');
      let data = rawData ? JSON.parse(rawData) : await apiCall('getSheetData');
      
      if (data.error) throw new Error(data.error);
      if (!rawData) sessionStorage.setItem('wm_pendency_data', JSON.stringify(data));
      
      // Remap backend array payload back into frontend objects
      db = data.map(r => ({ name: r[0], shipsyId: r[1], city: r[2], darkStore: r[3], fleetCoach: r[4] }));
      
      const cityEl = document.getElementById('citySelect');
      cityEl.innerHTML = '<option value="">Select City...</option>';
      [...new Set(db.map(i => i.city))].sort().forEach(c => cityEl.add(new Option(c, c)));
      
      cityEl.disabled = false; document.getElementById('storeSelect').disabled = false;
      cityCtrl = new TomSelect("#citySelect", { create: false, onChange: handleCityChange });
      storeCtrl = new TomSelect("#storeSelect", { create: false, onChange: updateTable });
      storeCtrl.disable();

      document.getElementById('loading-overlay').classList.add('opacity-0', 'pointer-events-none');
    } catch (err) {
      showToast("Data Sync Failed", true);
    }
  }
  document.addEventListener('DOMContentLoaded', initApp);

  function setMode(isCoach) {
    coachMode = isCoach;
    const activeClass = 'flex-1 py-2.5 rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-md transition-all';
    const inactiveClass = 'flex-1 py-2.5 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-200 transition-all';
    
    document.getElementById('btnNormal').className = !isCoach ? activeClass : inactiveClass;
    document.getElementById('btnCoach').className = isCoach ? activeClass : inactiveClass;
    document.getElementById('storeWrapper').style.display = isCoach ? 'none' : 'block';
    
    document.getElementById('resultArea').classList.add('hidden');
    document.getElementById('resultArea').classList.remove('fade-in');
    
    if(cityCtrl) cityCtrl.clear(); 
    if(storeCtrl) storeCtrl.clear();
  }

  function handleCityChange(c) {
    if (!c) return;
    if (coachMode) updateTable(); 
    else {
      storeCtrl.clearOptions(); storeCtrl.clear();
      [...new Set(db.filter(i => i.city === c).map(i => i.darkStore))].sort().forEach(s => storeCtrl.addOption({ value: s, text: s }));
      storeCtrl.enable();
    }
  }

  function updateTable() {
    const c = cityCtrl.getValue(), s = storeCtrl.getValue();
    if (!c || (!coachMode && !s)) return;
    
    filtered = coachMode ? db.filter(i => i.city === c) : db.filter(i => i.city === c && i.darkStore === s);
    
    if (coachMode) {
      let sum = {}; filtered.forEach(i => sum[i.fleetCoach] = (sum[i.fleetCoach] || 0) + 1);
      displayArray = Object.entries(sum).sort().map(([n, cnt]) => ({name: n, cnt: cnt}));
    } else displayArray = filtered;

    document.getElementById('countBadge').innerText = filtered.length;
    currentPage = 1; renderPage();
  }

  function renderPage() {
    const start = (currentPage - 1) * rowsPerPage;
    const chunk = displayArray.slice(start, start + rowsPerPage);
    totalPages = Math.ceil(displayArray.length / rowsPerPage) || 1;

    if (filtered.length === 0) {
      document.getElementById('tableHead').innerHTML = '';
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="2" class="py-12"><div class="text-emerald-500 font-extrabold text-xl mb-2">🎉 All Clear!</div><div class="text-slate-500 font-bold">No pending items found.</div></td></tr>`;
      document.getElementById('paginationControls').classList.add('hidden');
    } else {
      let head = coachMode ? `<tr><th class="py-4">Fleet Coach</th><th class="py-4">Pendency</th></tr>` : `<tr><th class="py-4 w-1/2">WM Name</th><th class="py-4 w-1/2">Shipsy ID</th></tr>`;
      let body = chunk.map(i => {
        const nCol = i.name === 'Missing' ? `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-extrabold border border-red-200">Missing</span>` : i.name;
        return coachMode ? `<tr><td class="py-4">${nCol}</td><td class="py-4"><span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold">${i.cnt}</span></td></tr>` 
                         : `<tr><td class="py-4">${nCol}</td><td class="py-4 font-mono">${i.shipsyId}</td></tr>`;
      }).join('');
      document.getElementById('tableHead').innerHTML = head;
      document.getElementById('tableBody').innerHTML = body;
      
      const pg = document.getElementById('paginationControls');
      if(totalPages > 1) { pg.classList.remove('hidden'); pg.classList.add('flex'); } else pg.classList.add('hidden');
      document.getElementById('pageIndicator').innerText = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('btnPrev').disabled = currentPage === 1;
      document.getElementById('btnNext').disabled = currentPage === totalPages;
    }

    const resArea = document.getElementById('resultArea');
    resArea.classList.remove('hidden');
    resArea.classList.add('flex', 'fade-in');
  }

  function changePage(dir) { currentPage += dir; renderPage(); }

  function navigateTo(page, btn) {
    btn.innerText = "Routing...";
    if (window.google && google.script) {
      google.script.run.withSuccessHandler(url => window.top.location.href = url + "?page=" + page).getScriptUrl();
    } else window.location.href = `${page}.html`; // Fallback for GitHub Pages routing
  }

  async function doExport(type) {
    if (!filtered.length) return;
    const name = coachMode ? `${cityCtrl.getValue()} Coach Summary` : storeCtrl.getValue();
    const btnSheet = document.getElementById('dlSheet');
    const btnPdf = document.getElementById('dlPdf');
    btnSheet.disabled = true; btnPdf.disabled = true;

    try {
      if (type === 'pdf') {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFont("times", "bold").setFontSize(14).text(`${name} Report`, doc.internal.pageSize.getWidth()/2, 15, { align: "center" });
        
        doc.autoTable({
          head: coachMode ? [['FLEET COACH', 'DARK STORE', 'WM NAME', 'SHIPSY ID']] : [['NAME', 'SHIPSY ID']],
          body: coachMode ? filtered.map(i => [i.fleetCoach, i.darkStore, i.name, i.shipsyId]) : filtered.map(i => [i.name, i.shipsyId]),
          startY: 25, theme: 'grid', styles: { halign: 'center', fontSize: 8, font: 'times', lineColor: [0,0,0] }, headStyles: { fillColor: [253, 253, 150], textColor: [0,0,0] }
        });
        doc.save(`${name}.pdf`);
        await apiCall('logExport', { type: 'pdf', title: name, isCoachMode: coachMode });
      } else {
        const res = await apiCall('processExport', { dataStr: JSON.stringify(filtered), title: name, isCoachMode: coachMode });
        if (res.error) throw new Error(res.error);
        window.open(res.url, '_blank');
      }
    } catch(e) { showToast(e.message || "Export Failed", true); }
    
    btnSheet.disabled = false; btnPdf.disabled = false;
  }
</script>
</body>
</html>
